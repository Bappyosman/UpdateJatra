<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>যাত্রা Jatra — Find Local Transport</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,700;0,900;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ─── TOKENS ─────────────────────────────────── */
  :root {
    --saffron:   #F5A623;
    --saffron-d: #D4881A;
    --saffron-l: #FDE8BC;
    --teal:      #0C3B4A;
    --teal-m:    #155068;
    --teal-l:    #1E6E8C;
    --cream:     #FDF8F0;
    --cream-d:   #F2EAD8;
    --ink:       #1A1208;
    --muted:     #6B5E48;
    --white:     #FFFFFF;
    --red:       #E53935;
    --green:     #2E7D32;
    --r: 14px;
    --r-sm: 8px;
  }

  /* ─── RESET ──────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── NOISE TEXTURE ──────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: .5;
  }

  /* ─── HEADER ─────────────────────────────────── */
  header {
    position: relative; z-index: 10;
    background: var(--teal);
    padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 58px;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);
  }
  .logo {
    font-family: 'Fraunces', serif;
    font-weight: 900; font-size: 22px;
    color: var(--white);
    display: flex; align-items: center; gap: 10px;
    letter-spacing: -0.5px;
  }
  .logo-dot { color: var(--saffron); }
  .logo-badge {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px; font-weight: 600;
    background: var(--saffron); color: var(--ink);
    padding: 2px 8px; border-radius: 999px;
    letter-spacing: .5px; text-transform: uppercase;
  }
  .header-count {
    font-size: 12px; color: rgba(255,255,255,.55); font-weight: 500;
  }

  /* ─── HERO ───────────────────────────────────── */
  .hero {
    position: relative; z-index: 2;
    background: linear-gradient(160deg, var(--teal) 0%, var(--teal-m) 55%, var(--teal-l) 100%);
    padding: 52px 24px 64px;
    overflow: hidden;
  }
  .hero::after {
    content: '';
    position: absolute; right: -60px; bottom: -60px;
    width: 320px; height: 320px; border-radius: 50%;
    background: radial-gradient(circle, rgba(245,166,35,.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-inner { max-width: 680px; margin: 0 auto; position: relative; }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(245,166,35,.15); border: 1px solid rgba(245,166,35,.35);
    color: var(--saffron); border-radius: 999px;
    padding: 4px 14px; font-size: 11px; font-weight: 600;
    letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 20px;
  }
  .hero h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(34px, 7vw, 60px);
    font-weight: 900; line-height: 1.08;
    color: var(--white); margin-bottom: 14px;
  }
  .hero h1 em {
    font-style: italic; color: var(--saffron);
    font-weight: 300;
  }
  .hero p {
    color: rgba(255,255,255,.6); font-size: 15px;
    line-height: 1.65; max-width: 440px; margin-bottom: 32px;
  }

  /* Search bar */
  .search-wrap {
    display: flex; gap: 8px; align-items: center;
    background: rgba(255,255,255,.08);
    border: 1.5px solid rgba(255,255,255,.15);
    border-radius: 12px; padding: 6px 6px 6px 16px;
    backdrop-filter: blur(10px);
  }
  .search-wrap input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--white); font-family: 'DM Sans', sans-serif;
    font-size: 14px; placeholder-color: rgba(255,255,255,.4);
  }
  .search-wrap input::placeholder { color: rgba(255,255,255,.4); }
  .search-wrap button {
    background: var(--saffron); color: var(--ink);
    border: none; border-radius: 8px; padding: 9px 20px;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    font-weight: 700; cursor: pointer; white-space: nowrap;
    transition: background .2s, transform .15s;
  }
  .search-wrap button:hover { background: var(--saffron-d); transform: scale(1.02); }

  /* ─── VEHICLE TABS ────────────────────────────── */
  .tabs-section {
    position: relative; z-index: 5;
    background: var(--white);
    border-bottom: 2px solid var(--cream-d);
    padding: 0 20px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs-section::-webkit-scrollbar { display: none; }
  .tabs-inner {
    display: flex; gap: 0;
    max-width: 960px; margin: 0 auto;
    min-width: max-content;
  }
  .tab-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 16px 22px; border: none; background: none;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    color: var(--muted); cursor: pointer; white-space: nowrap;
    border-bottom: 3px solid transparent; margin-bottom: -2px;
    transition: color .2s, border-color .2s;
  }
  .tab-btn:hover { color: var(--teal); }
  .tab-btn.active { color: var(--teal); border-bottom-color: var(--saffron); font-weight: 600; }
  .tab-icon { font-size: 20px; }
  .tab-count {
    font-size: 11px; background: var(--cream-d); color: var(--muted);
    border-radius: 999px; padding: 1px 8px; font-weight: 600;
    transition: background .2s, color .2s;
  }
  .tab-btn.active .tab-count { background: var(--saffron-l); color: var(--saffron-d); }

  /* ─── MAIN CONTENT ────────────────────────────── */
  main {
    position: relative; z-index: 2;
    max-width: 960px; margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* ─── RESULTS HEADER ──────────────────────────── */
  .results-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 22px; flex-wrap: wrap; gap: 10px;
  }
  .results-title {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 700; color: var(--teal);
  }
  .results-meta { font-size: 13px; color: var(--muted); }
  .results-meta strong { color: var(--ink); }

  /* ─── DRIVER GRID ─────────────────────────────── */
  .drivers-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(272px, 1fr));
    gap: 18px;
  }

  /* ─── DRIVER CARD ─────────────────────────────── */
  .driver-card {
    background: var(--white);
    border: 1.5px solid var(--cream-d);
    border-radius: var(--r);
    padding: 22px;
    display: flex; flex-direction: column; gap: 16px;
    transition: transform .22s, box-shadow .22s, border-color .22s;
    animation: fadeUp .35s ease both;
    position: relative; overflow: hidden;
  }
  .driver-card::before {
    content: attr(data-icon);
    position: absolute; right: -8px; top: -8px;
    font-size: 70px; opacity: .06;
    pointer-events: none; line-height: 1;
  }
  .driver-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 36px rgba(12,59,74,.13);
    border-color: var(--saffron);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-top { display: flex; align-items: center; gap: 14px; }
  .card-avatar {
    width: 50px; height: 50px; border-radius: 50%;
    background: linear-gradient(135deg, var(--teal-m), var(--teal-l));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-size: 20px; font-weight: 900;
    color: var(--white); flex-shrink: 0;
  }
  .card-name {
    font-family: 'Fraunces', serif;
    font-size: 17px; font-weight: 700; color: var(--ink);
    margin-bottom: 3px;
  }
  .card-vehicle-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--cream-d); color: var(--teal);
    border-radius: 999px; padding: 3px 11px;
    font-size: 11px; font-weight: 600;
  }
  .card-details { display: flex; flex-direction: column; gap: 7px; }
  .card-detail {
    display: flex; align-items: center; gap: 9px;
    font-size: 13px; color: var(--muted);
  }
  .card-detail-icon {
    width: 26px; height: 26px; border-radius: 7px;
    background: var(--cream); display: flex; align-items: center;
    justify-content: center; font-size: 14px; flex-shrink: 0;
  }
  .card-detail span { flex: 1; }
  .phone-num { font-weight: 600; color: var(--ink); letter-spacing: .3px; }

  .call-pulse {
    width: 8px; height: 8px; background: var(--saffron);
    border-radius: 50%; animation: pulse 1.6s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%       { transform: scale(1.6); opacity: .5; }
  }

  /* ─── EMPTY STATE ─────────────────────────────── */
  .empty-state {
    text-align: center; padding: 70px 20px;
    grid-column: 1 / -1;
  }
  .empty-icon { font-size: 60px; margin-bottom: 18px; display: block; }
  .empty-state h3 {
    font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700;
    color: var(--teal); margin-bottom: 8px;
  }
  .empty-state p { font-size: 14px; color: var(--muted); max-width: 280px; margin: 0 auto; }

  /* ─── FOOTER ──────────────────────────────────── */
  footer {
    position: relative; z-index: 2;
    background: var(--teal); color: rgba(255,255,255,.45);
    text-align: center; padding: 22px 20px;
    font-size: 12px;
  }
  footer span { color: var(--saffron); }

  /* ─── CARD BUTTON ROW ────────────────────────── */
  .card-actions {
    display: grid; grid-template-columns: 1fr 1fr; gap: 9px;
  }
  .call-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--teal); color: var(--white);
    border: none; border-radius: 10px; padding: 12px 10px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; text-decoration: none; width: 100%;
    transition: background .2s, transform .15s, box-shadow .2s;
    box-shadow: 0 4px 14px rgba(12,59,74,.22);
  }
  .call-btn:hover {
    background: var(--teal-m); transform: scale(1.025);
    box-shadow: 0 6px 20px rgba(12,59,74,.32);
  }
  .call-btn:active { transform: scale(.98); }

  .loc-btn {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    background: var(--saffron-l); color: var(--saffron-d);
    border: 1.5px solid var(--saffron);
    border-radius: 10px; padding: 12px 10px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; width: 100%;
    transition: background .2s, transform .15s, box-shadow .2s;
  }
  .loc-btn:hover {
    background: var(--saffron); color: var(--ink);
    transform: scale(1.025);
    box-shadow: 0 4px 14px rgba(245,166,35,.35);
  }
  .loc-btn:active { transform: scale(.98); }
  .loc-btn.loading { opacity: .7; pointer-events: none; }

  /* ─── LOCATION TOAST ──────────────────────────── */
  #loc-toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(12px);
    background: var(--ink); color: var(--white);
    padding: 12px 22px; border-radius: 999px;
    font-size: 13px; font-weight: 500; z-index: 999;
    opacity: 0; pointer-events: none;
    transition: opacity .3s, transform .3s;
    white-space: nowrap; max-width: 90vw; text-align: center;
    display: flex; align-items: center; gap: 8px;
  }
  #loc-toast.show {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }
  #loc-toast.success { background: #1B5E20; }
  #loc-toast.error   { background: #B71C1C; }

  /* ─── RESPONSIVE ──────────────────────────────── */
  @media (max-width: 500px) {
    .hero { padding: 38px 18px 50px; }
    .hero h1 { font-size: 34px; }
    .search-wrap { flex-direction: column; gap: 8px; padding: 12px; }
    .search-wrap button { width: 100%; }
    .drivers-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ─── HEADER ─── -->
<header>
  <div class="logo">
    যাত্রা<span class="logo-dot">.</span>
    <span class="logo-badge">Transport</span>
  </div>
  <div class="header-count" id="header-count">Loading...</div>
</header>

<!-- ─── HERO ─── -->
<section class="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">📍 Bangladesh Local Transport</div>
    <h1>Find <em>Local</em><br>Transport Drivers</h1>
    <p>Browse rickshaw, CNG, auto, ambulance & car drivers near you — and call them directly in one tap.</p>
    <div class="search-wrap">
      <input
        type="text"
        id="search-input"
        placeholder="Search by driver name or area…"
        oninput="renderDrivers()"
        onkeydown="if(event.key==='Enter') renderDrivers()"
      >
      <button onclick="renderDrivers()">🔍 Search</button>
    </div>
  </div>
</section>

<!-- ─── VEHICLE TABS ─── -->
<div class="tabs-section">
  <div class="tabs-inner" id="tabs-inner"></div>
</div>

<!-- ─── MAIN ─── -->
<main>
  <div class="results-header">
    <div class="results-title" id="results-title">All Drivers</div>
    <div class="results-meta" id="results-meta"></div>
  </div>
  <div class="drivers-grid" id="drivers-grid"></div>
</main>

<!-- ─── LOCATION TOAST ─── -->
<div id="loc-toast"></div>

<!-- ─── FOOTER ─── -->
<footer>
  যাত্রা Jatra — Find Local Transport &nbsp;|&nbsp; Built for <span>Bangladesh 🇧🇩</span>
</footer>

<script>
/* ═══════════════════════════════════════════════
   DRIVER DATA
═══════════════════════════════════════════════ */
const drivers = [
  { name: "Rahim Uddin",    vehicle: "CNG",           location: "Dhaka, Mirpur",     phone: "01711000001" },
  { name: "Karim Mia",      vehicle: "Rickshaw",       location: "Gazipur",           phone: "01811000002" },
  { name: "Jamal Hossain",  vehicle: "Auto Rickshaw",  location: "Dhaka, Mohakhali",  phone: "01911000003" },
  { name: "Salam Sheikh",   vehicle: "Car",            location: "Dhaka, Gulshan",    phone: "01611000004" },
  { name: "Faruk Ahmed",    vehicle: "Ambulance",      location: "Dhaka, Dhanmondi",  phone: "01511000005" },
  { name: "Nizam Ali",      vehicle: "CNG",            location: "Chittagong",        phone: "01711000006" },
  { name: "Sabbir Rahman",  vehicle: "Rickshaw",       location: "Dhaka, Banani",     phone: "01811000007" },
  { name: "Rafiq Islam",    vehicle: "Auto Rickshaw",  location: "Sylhet",            phone: "01911000008" },
  { name: "Tanvir Hasan",   vehicle: "Car",            location: "Dhaka, Uttara",     phone: "01611000009" },
  { name: "Mizan Talukder", vehicle: "Ambulance",      location: "Rajshahi",          phone: "01511000010" },
  { name: "Arif Billah",    vehicle: "CNG",            location: "Dhaka, Rampura",    phone: "01711000011" },
  { name: "Shohag Mia",     vehicle: "Rickshaw",       location: "Narayanganj",       phone: "01811000012" },
  { name: "Delwar Khan",    vehicle: "Auto Rickshaw",  location: "Dhaka, Jigatola",   phone: "01911000013" },
  { name: "Sumon Gazi",     vehicle: "Car",            location: "Khulna",            phone: "01611000014" },
  { name: "Hanif Bepari",   vehicle: "Ambulance",      location: "Dhaka, Tejgaon",    phone: "01511000015" },
  { name: "Babul Sarker",   vehicle: "CNG",            location: "Comilla",           phone: "01711000016" },
  { name: "Tofael Ahmed",   vehicle: "Rickshaw",       location: "Dhaka, Lalbagh",    phone: "01811000017" },
  { name: "Monir Hossain",  vehicle: "Car",            location: "Dhaka, Bashundhara",phone: "01611000018" },
  { name: "Jahangir Alam",  vehicle: "Auto Rickshaw",  location: "Mymensingh",        phone: "01911000019" },
  { name: "Rubel Miah",     vehicle: "CNG",            location: "Dhaka, Demra",      phone: "01711000020" },
];

/* ═══════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════ */
const VEHICLES = [
  { key: "All",          label: "All",          icon: "🗺️"  },
  { key: "Rickshaw",     label: "Rickshaw",     icon: "🛺"  },
  { key: "Auto Rickshaw",label: "Auto Rickshaw",icon: "🛵"  },
  { key: "CNG",          label: "CNG",          icon: "🚐"  },
  { key: "Ambulance",    label: "Ambulance",    icon: "🚑"  },
  { key: "Car",          label: "Car",          icon: "🚗"  },
];

let activeVehicle = "All";

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */
function esc(str) {
  return String(str)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function vehicleIcon(v) {
  return VEHICLES.find(x => x.key === v)?.icon || "🚗";
}

function initials(name) {
  return name.trim().split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
}

/* ═══════════════════════════════════════════════
   BUILD TABS
═══════════════════════════════════════════════ */
function buildTabs() {
  const container = document.getElementById("tabs-inner");
  container.innerHTML = VEHICLES.map(v => {
    const count = v.key === "All"
      ? drivers.length
      : drivers.filter(d => d.vehicle === v.key).length;
    return `
      <button
        class="tab-btn ${v.key === activeVehicle ? "active" : ""}"
        onclick="setVehicle('${v.key}')"
        aria-label="Filter by ${v.label}"
      >
        <span class="tab-icon">${v.icon}</span>
        ${v.label}
        <span class="tab-count">${count}</span>
      </button>`;
  }).join("");
}

function setVehicle(key) {
  activeVehicle = key;
  buildTabs();
  renderDrivers();
}

/* ═══════════════════════════════════════════════
   RENDER DRIVERS
═══════════════════════════════════════════════ */
function renderDrivers() {
  const query = (document.getElementById("search-input").value || "").toLowerCase().trim();
  const grid  = document.getElementById("drivers-grid");

  const filtered = drivers.filter(d => {
    const matchVehicle = activeVehicle === "All" || d.vehicle === activeVehicle;
    const matchSearch  = !query ||
      d.name.toLowerCase().includes(query) ||
      d.location.toLowerCase().includes(query);
    return matchVehicle && matchSearch;
  });

  // Results header
  const vLabel = activeVehicle === "All" ? "All Drivers" : `${vehicleIcon(activeVehicle)} ${activeVehicle} Drivers`;
  document.getElementById("results-title").textContent = vLabel;
  document.getElementById("results-meta").innerHTML =
    `Found <strong>${filtered.length}</strong> driver${filtered.length !== 1 ? "s" : ""}${query ? ` for "<strong>${esc(query)}</strong>"` : ""}`;
  document.getElementById("header-count").textContent =
    `${filtered.length} of ${drivers.length} drivers`;

  if (!filtered.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <span class="empty-icon">🔍</span>
        <h3>No drivers found</h3>
        <p>Try a different vehicle type or search term.</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map((d, i) => `
    <div class="driver-card" data-icon="${vehicleIcon(d.vehicle)}" style="animation-delay:${i * 55}ms">
      <div class="card-top">
        <div class="card-avatar">${esc(initials(d.name))}</div>
        <div>
          <div class="card-name">${esc(d.name)}</div>
          <span class="card-vehicle-badge">
            ${vehicleIcon(d.vehicle)} ${esc(d.vehicle)}
          </span>
        </div>
      </div>
      <div class="card-details">
        <div class="card-detail">
          <div class="card-detail-icon">📍</div>
          <span>${esc(d.location)}</span>
        </div>
        <div class="card-detail">
          <div class="card-detail-icon">📞</div>
          <span class="phone-num">${esc(d.phone)}</span>
        </div>
      </div>
      <div class="card-actions">
        <a class="call-btn" href="tel:+880${esc(d.phone.replace(/^0/,''))}">
          <div class="call-pulse"></div>
          Call ${esc(d.name.split(" ")[0])}
        </a>
        <button class="loc-btn" onclick="sendLocation('${esc(d.phone)}', '${esc(d.name.split(' ')[0])}', this)">
          📍 Send Location
        </button>
      </div>
    </div>
  `).join("");
}

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
function showToast(msg, type = '', duration = 3500) {
  const t = document.getElementById('loc-toast');
  t.textContent = msg;
  t.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = '', duration);
}

/* ═══════════════════════════════════════════════
   SEND LOCATION
═══════════════════════════════════════════════ */
function sendLocation(phone, driverFirstName, btn) {
  if (!navigator.geolocation) {
    showToast('❌ Geolocation not supported by your browser.', 'error');
    return;
  }

  btn.classList.add('loading');
  btn.textContent = '⏳ Getting location…';

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      btn.classList.remove('loading');
      btn.innerHTML = '📍 Send Location';

      const { latitude: lat, longitude: lng } = pos.coords;
      const mapsLink = `https://maps.google.com/?q=${lat},${lng}`;
      const msg = encodeURIComponent(
        `🚖 হ্যালো ${driverFirstName} ভাই, আমার লোকেশন এখানে:\n${mapsLink}\nআমাকে এখান থেকে নিন।`
      );
      const waPhone = '880' + phone.replace(/^0/, '');
      const waUrl   = `https://wa.me/${waPhone}?text=${msg}`;

      window.open(waUrl, '_blank');
      showToast(`✅ Location sent to ${driverFirstName} via WhatsApp!`, 'success');
    },
    (err) => {
      btn.classList.remove('loading');
      btn.innerHTML = '📍 Send Location';

      const msgs = {
        1: '❌ Location permission denied. Please allow access.',
        2: '❌ Could not detect your location.',
        3: '❌ Location request timed out.',
      };
      showToast(msgs[err.code] || '❌ Location error.', 'error');
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}

buildTabs();
renderDrivers();
</script>
